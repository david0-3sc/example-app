name: dokku

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]
    paths: ['**.ts', '**.js', '**.py', '**.go', '**.rs']

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: get diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.js' '*.py' '*.go' '*.rs' ':!**/*.test.*' ':!**/tests/**' ':!.github/**' > diff.txt
          else
            git diff HEAD~1 HEAD -- '*.ts' '*.js' '*.py' '*.go' '*.rs' ':!**/*.test.*' ':!**/tests/**' > diff.txt
          fi
      - name: run dokku
        uses: 3sidedcube/dokku@v1.0.1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: ${{ github.event_name == 'pull_request' && 'pr' || 'open-pr' }}
          pr-number: ${{ github.event.pull_request.number }}
          base-branch: main
